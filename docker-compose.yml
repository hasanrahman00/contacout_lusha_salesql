services:
  vikileads:
    image: hasandocker4/vikileads:3.6.0
    container_name: vikileads
    ports:
      - "3002:3002"
    environment:
      - CDP_HOST=host.docker.internal
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
    restart: unless-stopped